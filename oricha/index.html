<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0E1525" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<title>Oricha 降車アラート</title>
<style>
  :root{
    --bg:#0E1525; --panel:#16203a; --panel2:#1d294a;
    --line:#2e3a56; --ink:#e9eef9; --sub:#93a0bd;
    --far:#5fd0c5;     /* 遠い：落ち着いた青緑 */
    --near:#ffd166;    /* 予告圏内：黄 */
    --alert:#ff7a59;   /* 本アラート：暖オレンジ */
    --accent:#ffb85c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
    display:flex; flex-direction:column; min-height:100dvh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; border-bottom:1px solid var(--line);
  }
  .brand{display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:.02em}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(255,184,92,.18)}
  .brand small{display:block;font-weight:500;font-size:11px;color:var(--sub);letter-spacing:.06em}
  .gps{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:6px}
  .gps i{width:8px;height:8px;border-radius:50%;background:#445;display:inline-block}
  .gps.live i{background:#5fd0c5;box-shadow:0 0 8px #5fd0c5}

  main{flex:1; padding:18px; display:flex; flex-direction:column; gap:16px}

  /* メインの状態カード */
  .status{
    border:1px solid var(--line); border-radius:20px; padding:22px 20px;
    background:radial-gradient(120% 100% at 50% 0%, var(--panel2), var(--panel));
    text-align:center; position:relative; overflow:hidden;
    transition:border-color .4s, box-shadow .4s;
  }
  .status .eyebrow{font-size:12px;letter-spacing:.14em;color:var(--sub);text-transform:uppercase}
  .status .target{font-size:30px;font-weight:800;margin:6px 0 2px;line-height:1.15}
  .status .lines{font-size:12px;color:var(--sub);min-height:16px}
  .status .dist{
    font-variant-numeric:tabular-nums; font-weight:800; letter-spacing:-.01em;
    font-size:64px; line-height:1; margin:14px 0 4px; color:var(--far);
    transition:color .4s;
  }
  .status .dist span{font-size:24px;font-weight:700;color:var(--sub);margin-left:4px}
  .status .hint{font-size:13px;color:var(--sub);min-height:18px}
  .status.warn{border-color:var(--near)}
  .status.warn .dist{color:var(--near)}
  .status.fire{border-color:var(--alert); box-shadow:0 0 0 1px var(--alert),0 0 40px rgba(255,122,89,.35)}
  .status.fire .dist{color:var(--alert)}
  .status.fire::after{
    content:""; position:absolute; inset:0; border-radius:20px;
    box-shadow:inset 0 0 0 2px var(--alert);
    animation:pulse 1s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}

  /* 登録駅リスト */
  .section-title{font-size:12px;letter-spacing:.1em;color:var(--sub);margin:0 2px 8px}
  .targets{display:flex; flex-direction:column; gap:8px}
  .empty{border:1px dashed var(--line);border-radius:14px;padding:18px;text-align:center;color:var(--sub);font-size:14px}
  .chip{
    display:flex; align-items:center; gap:12px;
    border:1px solid var(--line); border-radius:14px; padding:12px 14px; background:var(--panel);
  }
  .chip .nm{font-weight:700}
  .chip .ln{font-size:11px;color:var(--sub)}
  .chip .d{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:700;color:var(--sub)}
  .chip.warn{border-color:var(--near)} .chip.warn .d{color:var(--near)}
  .chip.fire{border-color:var(--alert)} .chip.fire .d{color:var(--alert)}
  .chip .x{margin-left:6px;color:var(--sub);font-size:20px;line-height:1;padding:2px 6px;border-radius:8px}
  .chip .x:active{background:var(--panel2)}

  /* 検索 */
  .search{position:relative}
  input[type=search]{
    width:100%; padding:14px 16px; border-radius:14px; border:1px solid var(--line);
    background:var(--panel); color:var(--ink); font-size:16px; outline:none;
  }
  input[type=search]:focus{border-color:var(--accent)}
  .sug{
    position:absolute; left:0; right:0; top:calc(100% + 6px); z-index:5;
    background:var(--panel2); border:1px solid var(--line); border-radius:14px; overflow:hidden;
    max-height:260px; overflow-y:auto;
  }
  .sug button{
    display:flex; width:100%; align-items:baseline; gap:10px; text-align:left;
    background:none; border:0; color:var(--ink); padding:12px 14px; font-size:15px; cursor:pointer;
    border-bottom:1px solid var(--line);
  }
  .sug button:last-child{border-bottom:0}
  .sug button:active{background:var(--panel)}
  .sug .ln{font-size:11px;color:var(--sub)}

  /* 設定 */
  .settings{display:flex; gap:10px}
  .field{flex:1;border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:var(--panel)}
  .field label{display:block;font-size:11px;color:var(--sub);margin-bottom:4px}
  .field select{width:100%;background:none;border:0;color:var(--ink);font-size:15px;outline:none}

  /* フッター操作 */
  footer{padding:14px 18px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); display:flex; flex-direction:column; gap:10px; background:rgba(14,21,37,.9); backdrop-filter:blur(8px); position:sticky; bottom:0}
  .row{display:flex; gap:10px}
  button.btn{
    flex:1; border:0; border-radius:14px; padding:16px; font-size:16px; font-weight:700;
    color:#0E1525; background:var(--accent); cursor:pointer;
  }
  button.btn.ghost{background:var(--panel2); color:var(--ink); border:1px solid var(--line)}
  button.btn.stop{background:var(--alert); color:#1a0d08}
  button.btn:disabled{opacity:.4}
  .toggle{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:var(--panel);font-size:14px}
  .sw{width:46px;height:28px;border-radius:14px;background:var(--line);position:relative;transition:background .2s}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s}
  .sw.on{background:var(--far)} .sw.on::after{left:21px}

  /* 本アラート時の画面フラッシュ（iPhone等バイブ無し端末向け） */
  .flash{position:fixed; inset:0; background:var(--alert); z-index:50; pointer-events:none; opacity:0}
  .flash.go{animation:flash 1.4s ease-out}
  @keyframes flash{0%,100%{opacity:0}10%,30%,50%{opacity:.85}20%,40%{opacity:0}}

  .note{font-size:11px;color:var(--sub);text-align:center;line-height:1.5}

  /* 通知音停止ボタン：鳴っている間だけ表示 */
  .stopSoundBtn{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    z-index:60; padding:14px 28px; border-radius:999px; border:none;
    background:var(--alert); color:#1a1208; font-weight:700; font-size:15px;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
    opacity:0; pointer-events:none; transition:opacity .2s, transform .2s;
  }
  .stopSoundBtn.show{opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion: reduce){
    .status.fire::after{animation:none;opacity:.7}
    .flash.go{animation:none;opacity:.5}
  }
</style>
</head>
<body>
  <div class="flash" id="flash"></div>
  <button class="stopSoundBtn" id="stopSoundBtn" type="button">🔇 音を止める</button>

  <header>
    <div class="brand">
      <span class="dot"></span>
      <div>Oricha<small>降車アラート</small></div>
    </div>
    <div class="gps" id="gps"><i></i><span>停止中</span></div>
  </header>

  <main>
    <!-- メイン状態 -->
    <div class="status" id="status">
      <div class="eyebrow">次の降車駅</div>
      <div class="target" id="targetName">駅を登録してください</div>
      <div class="lines" id="targetLines"></div>
      <div class="dist" id="dist">--<span>m</span></div>
      <div class="hint" id="hint">下の検索から降車駅を追加 → 「監視開始」</div>
    </div>

    <!-- 登録駅 -->
    <div>
      <p class="section-title">登録した降車駅（何個でも）</p>
      <div class="targets" id="targets">
        <div class="empty">まだ登録がありません</div>
      </div>
    </div>

    <!-- 検索 -->
    <div class="search">
      <input id="q" type="search" placeholder="駅名で検索（例: しぶや / 渋谷）" autocomplete="off" />
      <div class="sug" id="sug" hidden></div>
    </div>

    <!-- 設定 -->
    <div class="settings">
      <div class="field">
        <label>予告（黄色）</label>
        <select id="notifyDist">
          <option value="2000">2.0 km 手前</option>
          <option value="1500" selected>1.5 km 手前</option>
          <option value="1000">1.0 km 手前</option>
        </select>
      </div>
      <div class="field">
        <label>本アラート（鳴る）</label>
        <select id="alertDist">
          <option value="500" selected>500 m 手前</option>
          <option value="300">300 m 手前</option>
          <option value="150">150 m 手前</option>
        </select>
      </div>
    </div>
  </main>

  <footer>
    <div class="toggle" id="wakeToggle">
      <span>画面を消さない（Wake Lock）</span>
      <div class="sw" id="wakeSw"></div>
    </div>
    <div class="row">
      <button class="btn ghost" id="demoBtn" disabled>デモ走行</button>
      <button class="btn" id="watchBtn" disabled>監視開始</button>
    </div>
    <p class="note" id="note">位置情報の許可が必要です。HTTPS か localhost で動きます。</p>
  </footer>

<script src="stations.js"></script>
<script>
(() => {
  "use strict";

  // ---- 永続化（プレビュー環境では失敗するのでtry）----
  const store = {
    get(k, def){ try{ const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; }catch{ return def; } },
    set(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch{} },
  };

  // ---- 状態 ----
  const state = {
    targets: store.get("oricha.targets", []),  // [{name,yomi,lat,lng,lines,armed}]
    watching: false,
    watchId: null,
    wakeLock: null,
    wakeWanted: store.get("oricha.wake", false),
    demoTimer: null,
    pos: null,                                  // {lat,lng}
    notifyDist: store.get("oricha.notify", 1500),
    alertDist: store.get("oricha.alert", 500),
  };

  // ---- DOM ----
  const $ = (id) => document.getElementById(id);
  const el = {
    status:$("status"), targetName:$("targetName"), targetLines:$("targetLines"),
    dist:$("dist"), hint:$("hint"), targets:$("targets"),
    q:$("q"), sug:$("sug"), gps:$("gps"), flash:$("flash"), stopSoundBtn:$("stopSoundBtn"),
    notifyDist:$("notifyDist"), alertDist:$("alertDist"),
    watchBtn:$("watchBtn"), demoBtn:$("demoBtn"),
    wakeToggle:$("wakeToggle"), wakeSw:$("wakeSw"), note:$("note"),
  };
  el.notifyDist.value = String(state.notifyDist);
  el.alertDist.value = String(state.alertDist);
  if (el.alertDist.value !== String(state.alertDist)){ // 廃止された選択肢（800等）が残っていた場合の救済
    state.alertDist = 500; el.alertDist.value = "500"; store.set("oricha.alert", 500);
  }
  el.wakeSw.classList.toggle("on", state.wakeWanted);

  // ---- 距離計算（ハバーサイン, m）----
  function distM(a, b){
    const R = 6371000, toR = Math.PI/180;
    const dLat = (b.lat-a.lat)*toR, dLng = (b.lng-a.lng)*toR;
    const la1 = a.lat*toR, la2 = b.lat*toR;
    const h = Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.min(1, Math.sqrt(h)));
  }
  function fmt(m){
    if (m == null) return ['--','m'];
    if (m >= 1000) return [(m/1000).toFixed(m<10000?2:1), 'km'];
    return [String(Math.round(m/10)*10), 'm'];
  }

  // ---- アラート（音 + フラッシュ + バイブ）----
  // 通知音は「停止ボタン」を押すまでループし続ける。停止ボタンは今鳴っている音だけを止め、
  // 次回以降のアラートには影響しない（alertToken を毎回新規発行することで実現）。
  let audioCtx = null;
  let alertToken = 0;
  let alertTimer = null;
  let activeNodes = [];

  function playPing(t, freq){
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = "sine"; o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.5, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.8);
    o.connect(g).connect(audioCtx.destination);
    o.start(t); o.stop(t+0.82);
    const node = { o, g };
    activeNodes.push(node);
    o.onended = () => { activeNodes = activeNodes.filter(n => n !== node); };
  }

  // 警告サイレン風（矢のこぎり波で上下にうねる音 + 2倍音を重ねて迫力を出す）
  const SIREN_DUR = 0.7;
  function playSiren(t){
    [
      { type:"sawtooth", gain:0.9, lo:500, hi:1100 },
      { type:"square",   gain:0.35, lo:1000, hi:2200 },
    ].forEach(({ type, gain, lo, hi }) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(lo, t);
      o.frequency.linearRampToValueAtTime(hi, t + SIREN_DUR/2);
      o.frequency.linearRampToValueAtTime(lo, t + SIREN_DUR);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(gain, t + 0.04);
      g.gain.setValueAtTime(gain, t + SIREN_DUR - 0.05);
      g.gain.exponentialRampToValueAtTime(0.0001, t + SIREN_DUR);
      o.connect(g).connect(audioCtx.destination);
      o.start(t); o.stop(t + SIREN_DUR + 0.02);
      const node = { o, g };
      activeNodes.push(node);
      o.onended = () => { activeNodes = activeNodes.filter(n => n !== node); };
    });
  }

  function beep(times=3){
    try{
      audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      let t = audioCtx.currentTime;
      for (let i=0;i<times;i++){ playPing(t, i%2 ? 880 : 1175); t += 0.9; } // ピンポン風
    }catch{}
  }

  function alertLoop(token){
    if (token !== alertToken) return;
    try{
      audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      playSiren(audioCtx.currentTime);
    }catch{}
    try{ navigator.vibrate && navigator.vibrate([250,120,250]); }catch{} // Android向け。iOSはバイブAPI非対応で無視される
    alertTimer = setTimeout(() => alertLoop(token), (SIREN_DUR + 0.15) * 1000);
  }

  function stopAlertSound(){
    alertToken++; // 次に fireAlert が発行する token と異なる値になるので、今鳴っている分だけ止まる
    if (alertTimer){ clearTimeout(alertTimer); alertTimer = null; }
    const now = audioCtx ? audioCtx.currentTime : 0;
    activeNodes.forEach(({ o, g }) => {
      try{ g.gain.cancelScheduledValues(now); g.gain.setValueAtTime(0.0001, now); o.stop(now); }catch{}
    });
    activeNodes = [];
    try{ navigator.vibrate && navigator.vibrate(0); }catch{} // 鳴動中のバイブを即停止
    el.stopSoundBtn.classList.remove("show");
  }

  function fireAlert(name){
    alertToken++;
    alertLoop(alertToken);
    el.stopSoundBtn.classList.add("show");
    el.flash.classList.remove("go"); void el.flash.offsetWidth; el.flash.classList.add("go");
    if ("Notification" in window && Notification.permission === "granted"){
      try{ new Notification("まもなく "+name, { body:"降車駅が近づいています", silent:false }); }catch{}
    }
  }

  // ---- 描画 ----
  function render(){
    // 登録駅リスト
    if (!state.targets.length){
      el.targets.innerHTML = '<div class="empty">まだ登録がありません</div>';
    } else {
      const rows = state.targets.map((t, i) => {
        const d = state.pos ? distM(state.pos, t) : null;
        const cls = d==null ? "" : d<=state.alertDist ? "fire" : d<=state.notifyDist ? "warn" : "";
        const [n,u] = fmt(d);
        const ln = (t.lines&&t.lines.length) ? t.lines.slice(0,2).join(" / ") : "";
        return `<div class="chip ${cls}">
          <div><div class="nm">${t.name}</div><div class="ln">${ln}</div></div>
          <div class="d">${n}<small>${u==='km'?' km':' m'}</small></div>
          <div class="x" data-del="${i}">×</div>
        </div>`;
      }).join("");
      el.targets.innerHTML = rows;
    }
    el.demoBtn.disabled = state.targets.length===0 || state.watching;
    el.watchBtn.disabled = state.targets.length===0;

    // メイン：最も近い登録駅
    if (!state.targets.length){
      el.targetName.textContent = "駅を登録してください";
      el.targetLines.textContent = ""; el.dist.innerHTML = '--<span>m</span>';
      el.status.className = "status"; el.hint.textContent = "下の検索から降車駅を追加 → 「監視開始」";
      return;
    }
    let nearest=null, nd=Infinity;
    if (state.pos) for (const t of state.targets){ const d = distM(state.pos,t); if (d<nd){nd=d;nearest=t;} }
    const show = nearest || state.targets[0];
    el.targetName.textContent = show.name;
    el.targetLines.textContent = (show.lines||[]).slice(0,2).join(" / ");
    if (state.pos){
      const [n,u] = fmt(nd);
      el.dist.innerHTML = `${n}<span>${u}</span>`;
      const cls = nd<=state.alertDist ? "fire" : nd<=state.notifyDist ? "warn" : "";
      el.status.className = "status " + cls;
      el.hint.textContent = nd<=state.alertDist ? "まもなく到着！降りる準備を"
                          : nd<=state.notifyDist ? "まもなく近づきます"
                          : "監視中…";
    } else {
      el.dist.innerHTML = '--<span>m</span>';
      el.status.className = "status";
      el.hint.textContent = state.watching ? "現在地を取得中…" : "「監視開始」を押すと計測します";
    }
  }

  // ---- 位置更新時の共通処理（実GPS・デモ共用）----
  function onPosition(lat, lng){
    state.pos = { lat, lng };
    for (const t of state.targets){
      const d = distM(state.pos, t);
      if (d <= state.alertDist && t.armed){ t.armed = false; fireAlert(t.name); }
      else if (d > state.alertDist*1.4 && !t.armed){ t.armed = true; } // 離れたら再武装
    }
    render();
  }

  // ---- 実GPS監視 ----
  function startWatch(){
    if (!("geolocation" in navigator)){ el.note.textContent = "この端末は位置情報に対応していません"; return; }
    state.targets.forEach(t => t.armed = true);
    state.watching = true; el.watchBtn.textContent = "監視停止"; el.watchBtn.classList.add("stop");
    el.gps.classList.add("live"); el.gps.querySelector("span").textContent = "監視中";
    el.note.textContent = "監視中。電車に乗っている間は画面を消さないでください。";
    requestWakeIfWanted();
    if ("Notification" in window && Notification.permission==="default") Notification.requestPermission();
    state.watchId = navigator.geolocation.watchPosition(
      (p) => onPosition(p.coords.latitude, p.coords.longitude),
      (err) => { el.note.textContent = "位置取得エラー: " + err.message; },
      { enableHighAccuracy:true, maximumAge:2000, timeout:15000 }
    );
    render();
  }
  function stopWatch(){
    if (state.watchId != null) navigator.geolocation.clearWatch(state.watchId);
    state.watchId = null; state.watching = false; state.pos = null;
    el.watchBtn.textContent = "監視開始"; el.watchBtn.classList.remove("stop");
    el.gps.classList.remove("live"); el.gps.querySelector("span").textContent = "停止中";
    el.note.textContent = "停止中。";
    releaseWake();
    stopAlertSound();
    render();
  }

  // ---- Wake Lock（画面を消さない）----
  async function requestWakeIfWanted(){
    if (!state.wakeWanted) return;
    try{
      if ("wakeLock" in navigator){
        state.wakeLock = await navigator.wakeLock.request("screen");
        state.wakeLock.addEventListener("release", () => {});
      }
    }catch(e){ /* 失敗しても監視自体は継続 */ }
  }
  async function releaseWake(){
    try{ if (state.wakeLock){ await state.wakeLock.release(); state.wakeLock = null; } }catch{}
  }
  // 一度バックグラウンド→復帰したら取り直す（Wake Lockは自動解放されるため）
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && state.watching) requestWakeIfWanted();
  });
  el.wakeToggle.addEventListener("click", () => {
    state.wakeWanted = !state.wakeWanted;
    el.wakeSw.classList.toggle("on", state.wakeWanted);
    store.set("oricha.wake", state.wakeWanted);
    if (state.wakeWanted && state.watching) requestWakeIfWanted(); else releaseWake();
  });

  // ---- デモ走行（電車なしで動作確認）----
  function startDemo(){
    if (!state.targets.length) return;
    const dest = state.targets[0];
    // 目的地の約2.2km南西からスタートして直線で近づく
    const startLat = dest.lat - 0.014, startLng = dest.lng - 0.016;
    state.targets.forEach(t => t.armed = true);
    el.note.textContent = "デモ走行中（仮想GPS）。実際の現在地は使いません。";
    let f = 0; const steps = 60;
    clearInterval(state.demoTimer);
    state.demoTimer = setInterval(() => {
      f++;
      const k = f/steps;
      onPosition(startLat + (dest.lat-startLat)*k, startLng + (dest.lng-startLng)*k);
      if (f >= steps){ clearInterval(state.demoTimer); state.demoTimer=null;
        setTimeout(()=>{ state.pos=null; el.note.textContent="デモ終了。"; render(); }, 1500); }
    }, 350);
  }

  // ---- 検索 ----
  // 駅名/よみは初回アクセス時に小文字化してキャッシュ（9000駅規模でも毎打鍵での再計算を避ける）
  function getStationIndex(){
    const list = window.STATIONS || [];
    if (state._stationIndex && state._stationIndexSrc === list) return state._stationIndex;
    const idx = list.map(s => ({
      s,
      nameLower: s.name.toLowerCase(),
      yomiLower: (s.yomi || "").toLowerCase(),
    }));
    state._stationIndex = idx;
    state._stationIndexSrc = list;
    return idx;
  }
  const MAX_RESULTS = 20;
  function search(qRaw){
    const q = qRaw.trim().toLowerCase();
    if (!q) return [];
    const have = new Set(state.targets.map(t => t.name+"|"+(t.lines||[]).join(",")));
    const idx = getStationIndex();
    const out = [];
    for (let i = 0; i < idx.length && out.length < MAX_RESULTS; i++){
      const { s, nameLower, yomiLower } = idx[i];
      if (!nameLower.includes(q) && !yomiLower.includes(q)) continue;
      if (have.has(s.name+"|"+(s.lines||[]).join(","))) continue;
      out.push(s);
    }
    return out;
  }
  function renderSug(list){
    if (!list.length){ el.sug.hidden = true; el.sug.innerHTML = ""; return; }
    el.sug.innerHTML = list.map((s,i) =>
      `<button data-i="${i}"><span>${s.name}</span><span class="ln">${(s.lines||[]).slice(0,2).join(" / ")}</span></button>`
    ).join("");
    el.sug._list = list; el.sug.hidden = false;
  }
  // 高速タイピング時に毎打鍵で検索が走らないよう軽くデバウンス
  let searchDebounceTimer = null;
  function debouncedRenderSug(value){
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => renderSug(search(value)), 60);
  }
  el.q.addEventListener("input", () => debouncedRenderSug(el.q.value));
  el.q.addEventListener("focus", () => { if (el.q.value) renderSug(search(el.q.value)); });
  el.sug.addEventListener("click", (e) => {
    const b = e.target.closest("button"); if (!b) return;
    const s = el.sug._list[+b.dataset.i];
    state.targets.push({ ...s, armed:true });
    store.set("oricha.targets", state.targets);
    el.q.value = ""; el.sug.hidden = true; render();
  });
  // 登録駅の削除
  el.targets.addEventListener("click", (e) => {
    const x = e.target.closest("[data-del]"); if (!x) return;
    state.targets.splice(+x.dataset.del, 1);
    store.set("oricha.targets", state.targets); render();
  });

  // ---- 設定変更 ----
  el.notifyDist.addEventListener("change", () => { state.notifyDist = +el.notifyDist.value; store.set("oricha.notify", state.notifyDist); render(); });
  el.alertDist.addEventListener("change", () => { state.alertDist = +el.alertDist.value; store.set("oricha.alert", state.alertDist); render(); });

  // ---- ボタン ----
  el.watchBtn.addEventListener("click", () => { beep(0); state.watching ? stopWatch() : startWatch(); });
  el.stopSoundBtn.addEventListener("click", stopAlertSound);
  el.demoBtn.addEventListener("click", startDemo);

  // ---- Service Worker 登録 ----
  if ("serviceWorker" in navigator){
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
  }

  // ---- 起動時に位置情報の許可ポップアップを先出しする ----
  // （クリックを待たずに getCurrentPosition を呼ぶと、多くのブラウザは
  //   その場で許可ダイアログを表示する。失敗してもここでは無視してよい。）
  if ("geolocation" in navigator){
    navigator.geolocation.getCurrentPosition(() => {}, () => {}, { maximumAge: 60000, timeout: 10000 });
  }

  // ---- Google検索アプリ等のアプリ内ブラウザでは位置情報が動かないことがあるため注意を表示 ----
  if (/\bGSA\/|FBAN|FBAV|Instagram|Line\//i.test(navigator.userAgent)){
    el.note.textContent = "このアプリ内ブラウザでは位置情報が正しく動かないことがあります。共有メニューなどから Safari / Chrome で開いてください。";
  }

  render();
})();
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
